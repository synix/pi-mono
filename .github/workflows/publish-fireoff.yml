name: Publish fireoff

on:
  workflow_dispatch:
    inputs:
      format:
        description: "Which format(s) to publish"
        type: choice
        options: [cjs, esm, both]
        default: both
      build_num:
        description: "Build number (leave empty to auto-generate: YYYYMMDDHHMMSS.<shortsha>)"
        type: string
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Guard branch
        if: github.ref != 'refs/heads/fire-off'
        run: |
          echo "::error::This workflow only runs on the fire-off branch (got ${{ github.ref }})."
          exit 1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@synix"

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git (for tag pushes from publish.mjs)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve build number
        id: build
        env:
          RAW: ${{ inputs.build_num }}
        run: |
          if [ -z "$RAW" ]; then
            num="$(date -u +%Y%m%d%H%M%S).$(git rev-parse --short=7 HEAD)"
            echo "auto-generated build_num: $num"
          else
            num="$RAW"
            echo "using supplied build_num: $num"
          fi
          echo "build_num=$num" >> "$GITHUB_OUTPUT"

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FMT: ${{ inputs.format }}
          BUILD_NUM: ${{ steps.build.outputs.build_num }}
        run: |
          set -euo pipefail
          run_format() {
            local fmt="$1"
            echo "::group::publish pi-ai ($fmt)"
            (cd packages/ai && node scripts/publish.mjs "$fmt" "$BUILD_NUM")
            echo "::endgroup::"
            echo "::group::publish pi-agent-core ($fmt)"
            (cd packages/agent && node scripts/publish.mjs "$fmt" "$BUILD_NUM")
            echo "::endgroup::"
          }
          if [[ "$FMT" == "cjs" || "$FMT" == "both" ]]; then
            run_format cjs
          fi
          if [[ "$FMT" == "esm" || "$FMT" == "both" ]]; then
            run_format esm
          fi
